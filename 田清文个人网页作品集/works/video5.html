    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        secondary: '#333333',
                        accent: '#ffffff',
                        light: '#f5f5f5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'ping-slow': 'ping-slow 3s cubic-bezier(0, 0, 0.2, 1) infinite',
                    },
                    keyframes: {
                        'pulse-slow': {
                            '0%, 100%': { opacity: 1 },
                            '50%': { opacity: 0.4 },
                        },
                        'ping-slow': {
                            '0%': { transform: 'scale(1)', opacity: 1 },
                            '75%, 100%': { transform: 'scale(2)', opacity: 0 },
                        },
                    }
                }
            }
        }

    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #888;
        }
        
        /* 毛玻璃金属按钮 */
        .glass-metal-button {
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
            padding: 1px;
        }
        
        .glass-metal-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom right, rgba(107, 114, 128, 0.8), rgba(75, 85, 99, 0.8));
            backdrop-filter: blur(8px);
            z-index: 0;
        }
        
        .glass-metal-button .shine-top-right {
            position: absolute;
            top: -1rem;
            right: -1rem;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            filter: blur(12px);
            transition: all 0.3s ease;
            z-index: 1;
        }
        
        .glass-metal-button .shine-bottom-left {
            position: absolute;
            bottom: -1.5rem;
            left: -1rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            filter: blur(12px);
            transition: all 0.3s ease;
            z-index: 1;
        }
        
        .glass-metal-button:hover .shine-top-right {
            width: 4rem;
            height: 4rem;
            background: rgba(255, 255, 255, 0.6);
        }
        
        .glass-metal-button:hover .shine-bottom-left {
            width: 3.5rem;
            height: 3.5rem;
            background: rgba(255, 255, 255, 0.5);
        }
        
        .glass-metal-button .button-content {
            position: relative;
            z-index: 2;
            padding: 0.625rem 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 0.5rem;
            border: 1px solid rgba(107, 114, 128, 0.7);
        }
        
        /* 状态指示灯 */
        .status-indicator {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 0.5rem;
            border: 1px solid rgba(107, 114, 128, 0.8);
        }
        
        .status-indicator .pulse {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .status-indicator .ping {
            position: absolute;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: ping-slow 3s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        

        
        /* 淡入动画 */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        
        .fade-in.active {
            opacity: 1;
            transform: translateY(0);
        }
        

    </style>
</head>

    <script>
        // 导航栏滚动效果
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('bg-opacity-95');
                navbar.classList.remove('bg-opacity-80');
            } else {
                navbar.classList.add('bg-opacity-80');
                navbar.classList.remove('bg-opacity-95');
            }
        });

        // 移动端菜单
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // 淡入动画
        document.addEventListener('DOMContentLoaded', () => {
            const fadeElements = document.querySelectorAll('.fade-in');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.1
            });
            
            fadeElements.forEach(el => {
                observer.observe(el);
            });
        });
    </script>
